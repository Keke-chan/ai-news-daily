<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AI Agent Daily Digest</title>
<meta name="description" content="Daily AI agent news digest for English learners — releases, technical deep-dives, and use cases."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0c0c0e;
  --surface: #16161a;
  --surface-hover: #1c1c22;
  --surface-active: #222228;
  --border: #2a2a32;
  --border-light: #35353f;
  --text: #e8e6e3;
  --text-secondary: #9a9a9a;
  --text-muted: #6a6a72;
  --accent: #6ee7b7;
  --accent-dim: #34d3991a;
  --accent-mid: #34d39940;
  --release: #818cf8;
  --release-bg: #818cf815;
  --technical: #f97316;
  --technical-bg: #f9731615;
  --usecase: #06b6d4;
  --usecase-bg: #06b6d415;
  --industry: #f472b6;
  --industry-bg: #f472b615;
  --research: #a78bfa;
  --research-bg: #a78bfa15;
  --font-display: 'Instrument Serif', serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius: 12px;
  --radius-sm: 8px;
}
*,*::before,*::after { margin:0;padding:0;box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}
::selection { background: var(--accent-mid); color: var(--text); }

.wrapper { max-width: 720px; margin: 0 auto; padding: 0 1.25rem; }

header {
  padding: 3rem 0 2rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2rem;
}
.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
}
.brand h1 {
  font-family: var(--font-display);
  font-size: clamp(1.8rem, 5vw, 2.6rem);
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 1.1;
  color: var(--text);
}
.brand h1 span { color: var(--accent); }
.brand p {
  font-size: 0.875rem;
  color: var(--text-secondary);
  margin-top: 0.4rem;
  max-width: 360px;
}
.date-nav {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-top: 0.25rem;
}
.date-nav button {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  width: 32px; height: 32px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 0.9rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.date-nav button:hover { background: var(--surface-hover); color: var(--text); }
.date-nav button:disabled { opacity: 0.3; cursor: default; }
.date-label {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--text-secondary);
  min-width: 130px;
  text-align: center;
}

.stats {
  display: flex;
  gap: 0.75rem;
  margin-top: 1.25rem;
  flex-wrap: wrap;
}
.stat-pill {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.3rem 0.7rem;
  border-radius: 50px;
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.02em;
}
.cat-release { background: var(--release-bg); color: var(--release); }
.cat-technical { background: var(--technical-bg); color: var(--technical); }
.cat-use-case { background: var(--usecase-bg); color: var(--usecase); }
.cat-industry { background: var(--industry-bg); color: var(--industry); }
.cat-research { background: var(--research-bg); color: var(--research); }
.cat-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
}

.articles { display: flex; flex-direction: column; gap: 1rem; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 0.2s;
}
.card:hover { border-color: var(--border-light); }
.card-header {
  padding: 1.25rem 1.5rem;
  cursor: pointer;
  display: flex;
  gap: 1rem;
  align-items: flex-start;
  user-select: none;
}
.card-num {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-muted);
  background: var(--bg);
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}
.card-main { flex: 1; min-width: 0; }
.card-headline {
  font-family: var(--font-display);
  font-size: 1.2rem;
  font-weight: 400;
  line-height: 1.3;
  margin-bottom: 0.35rem;
}
.card-oneliner {
  font-size: 0.9rem;
  color: var(--text-secondary);
  line-height: 1.5;
}
.card-meta {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-top: 0.6rem;
}
.expand-icon {
  color: var(--text-muted);
  font-size: 1rem;
  transition: transform 0.25s;
  flex-shrink: 0;
  margin-top: 2px;
}
.card.open .expand-icon { transform: rotate(180deg); }

.card-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease;
}
.card.open .card-detail { max-height: 1200px; }
.detail-inner {
  padding: 0 1.5rem 1.5rem;
  padding-left: calc(1.5rem + 28px + 1rem);
  border-top: 1px solid var(--border);
}
.detail-section { margin-top: 1.25rem; }
.detail-section h3 {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 0.6rem;
}
.detail-summary {
  font-size: 0.95rem;
  color: var(--text);
  line-height: 1.75;
}
.vocab-list { display: flex; flex-direction: column; gap: 0.75rem; }
.vocab-item {
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 0.85rem 1rem;
}
.vocab-term {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--accent);
}
.vocab-def {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-top: 0.2rem;
}
.vocab-example {
  font-size: 0.82rem;
  color: var(--text-muted);
  font-style: italic;
  margin-top: 0.25rem;
}
.discussion-box {
  background: var(--accent-dim);
  border: 1px solid var(--accent-mid);
  border-radius: var(--radius-sm);
  padding: 1rem;
  font-size: 0.9rem;
  color: var(--accent);
  line-height: 1.6;
}
.source-link {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  font-size: 0.8rem;
  color: var(--text-muted);
  text-decoration: none;
  margin-top: 1rem;
  transition: color 0.15s;
}
.source-link:hover { color: var(--accent); }

.archive-toggle {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-family: var(--font-body);
  font-size: 0.8rem;
  padding: 0.45rem 1rem;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 0.4rem;
  margin: 2rem auto 0;
}
.archive-toggle:hover { background: var(--surface-hover); color: var(--text); }
.archive-list {
  display: none;
  margin-top: 1rem;
  padding-bottom: 2rem;
}
.archive-list.show { display: block; }
.archive-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 0.5rem;
}
.archive-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.65rem 0.8rem;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}
.archive-item:hover { background: var(--surface-hover); border-color: var(--border-light); }
.archive-item.active { border-color: var(--accent); background: var(--accent-dim); }
.archive-date {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-secondary);
}
.archive-count {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-top: 0.15rem;
}

.empty-state {
  text-align: center;
  padding: 4rem 1rem;
  color: var(--text-muted);
}
.empty-state h2 {
  font-family: var(--font-display);
  font-size: 1.4rem;
  color: var(--text-secondary);
  margin-bottom: 0.5rem;
}

footer {
  border-top: 1px solid var(--border);
  margin-top: 3rem;
  padding: 1.5rem 0 2rem;
  text-align: center;
  font-size: 0.75rem;
  color: var(--text-muted);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.card {
  animation: fadeUp 0.4s ease both;
}
.card:nth-child(1) { animation-delay: 0.05s; }
.card:nth-child(2) { animation-delay: 0.1s; }
.card:nth-child(3) { animation-delay: 0.15s; }
.card:nth-child(4) { animation-delay: 0.2s; }
.card:nth-child(5) { animation-delay: 0.25s; }

@media (max-width: 540px) {
  header { padding: 2rem 0 1.5rem; }
  .detail-inner { padding-left: 1.25rem; padding-right: 1.25rem; }
  .card-header { padding: 1rem 1.15rem; }
  .card-num { display: none; }
}
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="header-top">
      <div class="brand">
        <h1>AI Agent <span>Daily Digest</span></h1>
        <p>Sharpen your English while staying ahead of the AI agent revolution.</p>
      </div>
      <div class="date-nav">
        <button id="prev-btn" onclick="navDate(-1)" title="Previous day">&#8249;</button>
        <span class="date-label" id="date-label">March 29, 2026</span>
        <button id="next-btn" onclick="navDate(1)" title="Next day">&#8250;</button>
      </div>
    </div>
    <div class="stats" id="stats-bar"></div>
  </header>

  <main>
    <div class="articles" id="articles-container"></div>

    <button class="archive-toggle" id="archive-toggle" onclick="toggleArchive()">
      <span>&#9783;</span> Browse archive
    </button>
    <div class="archive-list" id="archive-list">
      <div class="archive-grid" id="archive-grid"></div>
    </div>
  </main>

  <footer>
    AI Agent Daily Digest &mdash; auto-generated with Gemini &amp; GitHub Actions &mdash; updated daily
  </footer>
</div>

<script>
const ARCHIVES = [{"date": "2026-03-29", "articles": [{"headline": "Free Goose AI Tool Challenges Pricey Claude Code for Developers", "one_liner": "A new free, open-source AI tool called Goose is becoming popular among developers who find Anthropic's Claude Code too expensive.", "category": "release", "detailed_summary": "This article discusses Goose, a new open-source AI agent that helps developers write and debug code. It's a free alternative to Anthropic's expensive Claude Code, which has frustrated users with its high prices and strict usage limits. Goose runs locally on a user's computer, meaning no subscription fees or cloud dependency, and keeps data private. This development is important for the AI agent ecosystem because it offers developers a powerful, free, and private option, increasing competition and choice beyond commercial tools. It highlights a growing demand for accessible AI tools.", "vocabulary": [{"term": "AI agent", "definition": "An AI program that can act independently to achieve specific goals.", "example": "The AI agent successfully automated the data entry process for the company."}, {"term": "Open-source", "definition": "Software whose original source code is freely available for anyone to use and modify.", "example": "Linux is a well-known example of an open-source operating system."}, {"term": "Local machine", "definition": "A computer that a user directly uses, rather than a remote server or cloud service.", "example": "Many developers prefer to run their tools on a local machine for better control."}], "discussion_question": "What are the main benefits and drawbacks for developers choosing between a paid cloud-based AI agent and a free, local open-source one?", "source_url": "https://venturebeat.com/infrastructure/claude-code-costs-up-to-usd200-a-month-goose-does-the-same-thing-for-free", "source_title": "Claude Code costs up to $200 a month. Goose does the same thing for free."}, {"headline": "Salesforce Launches Powerful New Slackbot AI Agent for Workplaces", "one_liner": "Salesforce has updated Slackbot into a powerful AI agent that helps employees with tasks, competing with other big tech companies.", "category": "release", "detailed_summary": "Salesforce has launched a completely redesigned Slackbot, transforming it from a simple notification tool into a full AI agent. This new version can search company data, write documents, and perform actions for employees. It uses a Large Language Model (LLM), which is an AI model trained on vast amounts of text to understand and generate human-like language. The move aims to position Slack at the center of \"agentic AI,\" where AI software helps humans with complex tasks. This is significant for the AI agent ecosystem as it shows major companies integrating advanced AI agents into widely used business platforms, increasing their presence and utility in daily work.", "vocabulary": [{"term": "AI agent", "definition": "An artificial intelligence program designed to act autonomously to achieve specific goals.", "example": "The new AI agent can schedule meetings and send reminders automatically."}, {"term": "Large Language Model (LLM)", "definition": "An advanced AI model trained on huge text data to understand and generate human language.", "example": "ChatGPT is powered by a large language model that can write poems and code."}, {"term": "Agentic AI", "definition": "A type of AI where software agents work independently to complete complex tasks for humans.", "example": "Agentic AI is helping businesses automate customer service interactions more effectively."}], "discussion_question": "How might advanced AI agents like the new Slackbot change how people collaborate and get work done in a typical office environment?", "source_url": "https://venturebeat.com/technology/salesforce-rolls-out-new-slackbot-ai-agent-as-it-battles-microsoft-and", "source_title": "Salesforce rolls out new Slackbot AI agent as it battles Microsoft and Google in workplace AI"}, {"headline": "Anthropic Launches Cowork: A Desktop AI Agent for Non-Technical Tasks", "one_liner": "Anthropic released Cowork, a new AI agent for its Claude Max users that helps with non-coding tasks directly on your computer.", "category": "release", "detailed_summary": "Anthropic has launched Cowork, a new AI agent feature for its Claude Max subscribers that extends its Claude Code tool to non-technical users. Cowork allows users to perform tasks like organizing files or creating reports directly on their desktop, without needing to code. This innovation came from observing developers using Claude Code for non-programming tasks, showing a wider demand for versatile AI agents. For the AI agent ecosystem, Cowork represents a significant step towards making powerful AI agents accessible to a broader audience beyond just developers, competing with other productivity tools and expanding AI's practical applications.", "vocabulary": [{"term": "AI agent", "definition": "A computer program that performs tasks independently, often learning from its environment.", "example": "The AI agent helped me sort through hundreds of emails in minutes."}, {"term": "Non-technical users", "definition": "People who do not have specialized knowledge or skills in computer science or programming.", "example": "The software was designed to be user-friendly for non-technical users."}, {"term": "Productivity tools", "definition": "Software or applications designed to help users complete tasks more efficiently and effectively.", "example": "Spreadsheets and word processors are common productivity tools used daily."}], "discussion_question": "How could AI agents like Cowork change the way everyday users interact with their computers and manage their personal or work files?", "source_url": "https://venturebeat.com/technology/anthropic-launches-cowork-a-claude-desktop-agent-that-works-in-your-files-no", "source_title": "Anthropic launches Cowork, a Claude Desktop agent that works in your files — no coding required"}, {"headline": "Nous Research Unveils Free Open-Source AI Coding Model, NousCoder-14B", "one_liner": "Nous Research launched NousCoder-14B, a new open-source AI model for coding that competes with larger, proprietary systems.", "category": "research", "detailed_summary": "Nous Research, an open-source AI startup, has released NousCoder-14B, a new AI model for competitive programming. This model, trained quickly with advanced hardware, performs as well as or better than some larger commercial systems. \"Open-source\" means its code is freely available, allowing others to use and improve it. It arrives as Anthropic's Claude Code has gained attention, showing the rapid development in AI-assisted coding. This is important for the AI agent ecosystem because it offers a powerful, transparent alternative to proprietary tools, fostering innovation and making advanced coding AI more accessible to researchers and developers worldwide.", "vocabulary": [{"term": "Open-source", "definition": "Software with code that is freely available for anyone to view, use, and modify.", "example": "The community collaborated to improve the open-source software."}, {"term": "Proprietary systems", "definition": "Software or technology owned by a company, not freely available or modifiable by others.", "example": "Many companies rely on proprietary systems for their core business operations."}, {"term": "Benchmark", "definition": "A standard test used to compare the performance of different systems or models.", "example": "We ran a benchmark test to see which computer performed best."}], "discussion_question": "What are the advantages of open-source AI coding models like NousCoder-14B compared to proprietary ones for the future of software development?", "source_url": "https://venturebeat.com/technology/nous-researchs-nouscoder-14b-is-an-open-source-coding-model-landing-right-in", "source_title": "Nous Research's NousCoder-14B is an open-source coding model landing right in the Claude Code moment"}, {"headline": "Claude Code Creator Shares Workflow: Running Multiple AI Agents for Coding", "one_liner": "The creator of Claude Code revealed his workflow, which involves using five AI agents simultaneously, greatly boosting productivity.", "category": "technical", "detailed_summary": "Boris Cherny, the creator of Anthropic's Claude Code, has shared his unique workflow for software development, which involves running multiple AI agents in parallel. Instead of traditional linear coding, he manages five Claude agents in his terminal and more in his browser, acting like a \"fleet commander.\" This approach allows him to achieve the output of a small engineering team by having agents work on different tasks simultaneously. He also surprisingly uses Anthropic's slowest but smartest model, Opus 4.5. This workflow demonstrates how orchestrating AI agents can lead to significant productivity gains, showing a new direction for the AI agent ecosystem where efficiency comes from smart management rather than just raw computing power.", "vocabulary": [{"term": "Workflow", "definition": "The sequence of steps or tasks needed to complete a process or job.", "example": "We need to optimize our workflow to improve efficiency in the office."}, {"term": "AI agent", "definition": "An artificial intelligence program that can act independently to achieve specific goals.", "example": "The AI agent helped me manage my calendar and email efficiently."}, {"term": "Orchestration", "definition": "The automated arrangement, coordination, and management of complex computer systems or services.", "example": "Cloud orchestration tools help manage many virtual servers at once."}], "discussion_question": "How might managing multiple AI agents at once, as described by Claude Code's creator, change the role of human programmers in the future?", "source_url": "https://venturebeat.com/technology/the-creator-of-claude-code-just-revealed-his-workflow-and-developers-are", "source_title": "The creator of Claude Code just revealed his workflow, and developers are losing their minds"}]}];

let currentIndex = 0;

const categoryMeta = {
  'release': { label: 'Release', cls: 'cat-release' },
  'technical': { label: 'Technical', cls: 'cat-technical' },
  'use-case': { label: 'Use case', cls: 'cat-use-case' },
  'industry': { label: 'Industry', cls: 'cat-industry' },
  'research': { label: 'Research', cls: 'cat-research' },
};

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function renderDay(index) {
  currentIndex = index;
  const data = ARCHIVES[index];
  const container = document.getElementById('articles-container');
  const statsBar = document.getElementById('stats-bar');
  const dateLabel = document.getElementById('date-label');

  document.getElementById('prev-btn').disabled = index >= ARCHIVES.length - 1;
  document.getElementById('next-btn').disabled = index <= 0;

  if (!data || !data.articles || data.articles.length === 0) {
    container.innerHTML = '<div class="empty-state"><h2>No articles today</h2><p>Check back tomorrow for fresh AI agent news.</p></div>';
    statsBar.innerHTML = '';
    dateLabel.textContent = data ? data.date : 'No data';
    return;
  }

  try {
    const d = new Date(data.date + 'T00:00:00');
    dateLabel.textContent = d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  } catch(e) {
    dateLabel.textContent = data.date;
  }

  const cats = {};
  data.articles.forEach(a => {
    const c = a.category || 'technical';
    cats[c] = (cats[c] || 0) + 1;
  });
  statsBar.innerHTML = `<span class="stat-pill" style="background:var(--accent-dim);color:var(--accent);">${data.articles.length} article${data.articles.length > 1 ? 's' : ''}</span>` +
    Object.entries(cats).map(([cat, count]) => {
      const m = categoryMeta[cat] || categoryMeta['technical'];
      return `<span class="stat-pill ${m.cls}"><span class="cat-dot"></span>${m.label} ${count}</span>`;
    }).join('');

  container.innerHTML = data.articles.map((article, i) => {
    const cat = article.category || 'technical';
    const m = categoryMeta[cat] || categoryMeta['technical'];
    const vocabHtml = (article.vocabulary || []).map(v =>
      `<div class="vocab-item">
        <div class="vocab-term">${esc(v.term)}</div>
        <div class="vocab-def">${esc(v.definition)}</div>
        ${v.example ? `<div class="vocab-example">"${esc(v.example)}"</div>` : ''}
      </div>`
    ).join('');

    return `<div class="card" id="card-${i}">
      <div class="card-header" onclick="toggleCard(${i})">
        <span class="card-num">${String(i+1).padStart(2,'0')}</span>
        <div class="card-main">
          <div class="card-headline">${esc(article.headline)}</div>
          <div class="card-oneliner">${esc(article.one_liner)}</div>
          <div class="card-meta">
            <span class="stat-pill ${m.cls}" style="font-size:0.7rem;padding:0.2rem 0.55rem;"><span class="cat-dot"></span>${m.label}</span>
          </div>
        </div>
        <span class="expand-icon">&#9662;</span>
      </div>
      <div class="card-detail">
        <div class="detail-inner">
          <div class="detail-section">
            <h3>Summary</h3>
            <div class="detail-summary">${esc(article.detailed_summary)}</div>
          </div>
          <div class="detail-section">
            <h3>Vocabulary</h3>
            <div class="vocab-list">${vocabHtml}</div>
          </div>
          <div class="detail-section">
            <h3>Discussion</h3>
            <div class="discussion-box">${esc(article.discussion_question)}</div>
          </div>
          ${article.source_url ? `<a class="source-link" href="${esc(article.source_url)}" target="_blank" rel="noopener">Read original article &#8599;</a>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');

  renderArchiveGrid();
}

function toggleCard(i) {
  const card = document.getElementById('card-' + i);
  if (card) card.classList.toggle('open');
}

function navDate(dir) {
  const next = currentIndex - dir;
  if (next >= 0 && next < ARCHIVES.length) renderDay(next);
}

function toggleArchive() {
  const list = document.getElementById('archive-list');
  list.classList.toggle('show');
}

function renderArchiveGrid() {
  const grid = document.getElementById('archive-grid');
  grid.innerHTML = ARCHIVES.map((a, i) => {
    const count = a.articles ? a.articles.length : 0;
    return `<div class="archive-item ${i === currentIndex ? 'active' : ''}" onclick="renderDay(${i});window.scrollTo(0,0);">
      <div class="archive-date">${a.date}</div>
      <div class="archive-count">${count} article${count !== 1 ? 's' : ''}</div>
    </div>`;
  }).join('');
}

if (ARCHIVES.length > 0) {
  renderDay(0);
} else {
  document.getElementById('articles-container').innerHTML =
